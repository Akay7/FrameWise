<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" font-family="'DejaVu Sans','Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A0E1F"/>
      <stop offset="0.55" stop-color="#0E1430"/>
      <stop offset="1" stop-color="#141B3A"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.32" r="0.6">
      <stop offset="0" stop-color="#3B4CF0" stop-opacity="0.38"/>
      <stop offset="0.5" stop-color="#22B8E6" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#22B8E6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#E8ECF8"/>
      <stop offset="0.6" stop-color="#9FB4FF"/>
      <stop offset="1" stop-color="#5FE0F0"/>
    </linearGradient>
    <linearGradient id="play" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6E7CF5"/>
      <stop offset="1" stop-color="#33D6EE"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#glow)"/>

  <!-- Faint film-frame grid on the right -->
  <g opacity="0.10" stroke="#9FB4FF" stroke-width="2" fill="none">
    <rect x="1200" y="250" width="560" height="315" rx="18"/>
    <rect x="1200" y="595" width="560" height="235" rx="18"/>
    <line x1="1200" y1="330" x2="1760" y2="330"/>
    <line x1="1340" y1="250" x2="1340" y2="565"/>
    <line x1="1620" y1="250" x2="1620" y2="565"/>
  </g>

  <!-- Play button motif -->
  <g transform="translate(1480,470)">
    <circle r="150" fill="url(#play)" opacity="0.14" filter="url(#soft)"/>
    <circle r="118" fill="none" stroke="url(#play)" stroke-width="5" opacity="0.85"/>
    <path d="M -40 -58 L 70 0 L -40 58 Z" fill="url(#play)"/>
  </g>

  <!-- Eyebrow label -->
  <text x="122" y="212" fill="#7F8CB0" font-size="27" font-weight="700"
        letter-spacing="6">AMD DEVELOPER HACKATHON  ·  TRACK 2</text>

  <!-- Title -->
  <text x="116" y="372" fill="url(#title)" font-size="168" font-weight="700"
        letter-spacing="-3">FrameWise</text>

  <!-- Subtitle -->
  <text x="122" y="452" fill="#D5DEF2" font-size="52" font-weight="600">Multi-Style Video Captioning Agent</text>

  <!-- Tagline -->
  <text x="122" y="524" fill="#8B96B8" font-size="36" font-weight="400">One clip in. Four voices out — grounded in what's on screen.</text>

  <!-- Style pills -->
  <g font-size="30" font-weight="700">
    <g transform="translate(122,610)">
      <rect width="252" height="70" rx="35" fill="#1B2547" stroke="#3B82F6" stroke-width="2.5"/>
      <circle cx="42" cy="35" r="9" fill="#3B82F6"/>
      <text x="70" y="46" fill="#DCE6FB">formal</text>
    </g>
    <g transform="translate(398,610)">
      <rect width="288" height="70" rx="35" fill="#2A2340" stroke="#F59E0B" stroke-width="2.5"/>
      <circle cx="42" cy="35" r="9" fill="#F59E0B"/>
      <text x="70" y="46" fill="#F6E6C8">sarcastic</text>
    </g>
    <g transform="translate(122,700)">
      <rect width="330" height="70" rx="35" fill="#241E44" stroke="#8B5CF6" stroke-width="2.5"/>
      <circle cx="42" cy="35" r="9" fill="#8B5CF6"/>
      <text x="70" y="46" fill="#E4DBFB">humorous_tech</text>
    </g>
    <g transform="translate(476,700)">
      <rect width="392" height="70" rx="35" fill="#16302A" stroke="#10B981" stroke-width="2.5"/>
      <circle cx="42" cy="35" r="9" fill="#10B981"/>
      <text x="70" y="46" fill="#CFF2E5">humorous_non_tech</text>
    </g>
  </g>

  <!-- Bottom strip: pipeline -->
  <g transform="translate(122,905)" font-size="30" font-weight="600" fill="#8DA0C8">
    <text x="0" y="0">Watch</text>
    <text x="150" y="0" fill="#4C5A85">→</text>
    <text x="195" y="0">Understand</text>
    <text x="430" y="0" fill="#4C5A85">→</text>
    <text x="475" y="0">Caption</text>
    <text x="640" y="0" fill="#4C5A85">·</text>
    <text x="672" y="0" fill="#6E7CA8" font-weight="400">local on-device inference, no external API</text>
  </g>
</svg>
